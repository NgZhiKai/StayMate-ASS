spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  main:
    web-application-type: reactive
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          "[/**]":
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - "*"
            allowCredentials: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users,/api/users/**
          filters:
            - StripPrefix=1

        - id: user-service-bookmarks
          uri: lb://user-service
          predicates:
            - Path=/api/bookmarks,/api/bookmarks/**
          filters:
            - StripPrefix=1

        - id: hotel-service-hotels
          uri: lb://hotel-service
          predicates:
            - Path=/api/hotels,/api/hotels/**
          filters:
            - StripPrefix=1

        - id: hotel-service-rooms
          uri: lb://hotel-service
          predicates:
            - Path=/api/rooms,/api/rooms/**
          filters:
            - StripPrefix=1

        - id: hotel-service-reviews
          uri: lb://hotel-service
          predicates:
            - Path=/api/reviews,/api/reviews/**
          filters:
            - StripPrefix=1

        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/bookings,/api/bookings/**
          filters:
            - StripPrefix=1

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments,/api/payments/**
          filters:
            - StripPrefix=1

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications,/api/notifications/**
          filters:
            - StripPrefix=1

        - id: email-service
          uri: lb://email-service
          predicates:
            - Path=/api/email,/api/email/**
          filters:
            - StripPrefix=1

gateway:
  rate-limit:
    enabled: true
    replenish-tokens: 60
    burst-capacity: 120
    window-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
