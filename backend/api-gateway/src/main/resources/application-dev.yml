spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOriginPatterns:
              - http://localhost:*
              - http://127.0.0.1:*
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users,/api/users/**
          filters:
            - StripPrefix=1

        - id: user-service-bookmarks
          uri: http://localhost:8081
          predicates:
            - Path=/api/bookmarks,/api/bookmarks/**
          filters:
            - StripPrefix=1

        - id: hotel-service-hotels
          uri: http://localhost:8082
          predicates:
            - Path=/api/hotels,/api/hotels/**
          filters:
            - StripPrefix=1

        - id: hotel-service-rooms
          uri: http://localhost:8082
          predicates:
            - Path=/api/rooms,/api/rooms/**
          filters:
            - StripPrefix=1

        - id: hotel-service-reviews
          uri: http://localhost:8082
          predicates:
            - Path=/api/reviews,/api/reviews/**
          filters:
            - StripPrefix=1

        - id: booking-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/bookings,/api/bookings/**
          filters:
            - StripPrefix=1

        - id: payment-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/payments,/api/payments/**
          filters:
            - StripPrefix=1

        - id: notification-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/notifications,/api/notifications/**
          filters:
            - StripPrefix=1

        - id: email-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/email,/api/email/**
          filters:
            - StripPrefix=1

server:
  port: 8080
