spring:
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          "[/**]":
            allowedOrigins:
              - https://www.staymate.org
              - https://datv0gr5pi6zx.cloudfront.net
      routes:
        - id: user-service
          uri: http://user-service.${SERVICE_CONNECT_NAMESPACE:staymate}:8081
          predicates:
            - Path=/api/users,/api/users/**
          filters:
            - StripPrefix=1

        - id: user-service-bookmarks
          uri: http://user-service.${SERVICE_CONNECT_NAMESPACE:staymate}:8081
          predicates:
            - Path=/api/bookmarks,/api/bookmarks/**
          filters:
            - StripPrefix=1

        - id: hotel-service-hotels
          uri: http://hotel-service.${SERVICE_CONNECT_NAMESPACE:staymate}:8082
          predicates:
            - Path=/api/hotels,/api/hotels/**
          filters:
            - StripPrefix=1

        - id: hotel-service-rooms
          uri: http://hotel-service.${SERVICE_CONNECT_NAMESPACE:staymate}:8082
          predicates:
            - Path=/api/rooms,/api/rooms/**
          filters:
            - StripPrefix=1

        - id: hotel-service-reviews
          uri: http://hotel-service.${SERVICE_CONNECT_NAMESPACE:staymate}:8082
          predicates:
            - Path=/api/reviews,/api/reviews/**
          filters:
            - StripPrefix=1

        - id: booking-service
          uri: http://booking-service.${SERVICE_CONNECT_NAMESPACE:staymate}:8084
          predicates:
            - Path=/api/bookings,/api/bookings/**
          filters:
            - StripPrefix=1

        - id: payment-service
          uri: http://payment-service.${SERVICE_CONNECT_NAMESPACE:staymate}:8086
          predicates:
            - Path=/api/payments,/api/payments/**
          filters:
            - StripPrefix=1

        - id: notification-service
          uri: http://notification-service.${SERVICE_CONNECT_NAMESPACE:staymate}:8083
          predicates:
            - Path=/api/notifications,/api/notifications/**
          filters:
            - StripPrefix=1

        - id: email-service
          uri: http://email-service.${SERVICE_CONNECT_NAMESPACE:staymate}:8085
          predicates:
            - Path=/api/email,/api/email/**
          filters:
            - StripPrefix=1

server:
  port: ${SERVER_PORT:8080}

gateway:
  rate-limit:
    enabled: ${GATEWAY_RATE_LIMIT_ENABLED:true}
    replenish-tokens: ${GATEWAY_RATE_LIMIT_REPLENISH_TOKENS:60}
    burst-capacity: ${GATEWAY_RATE_LIMIT_BURST_CAPACITY:120}
    window-seconds: ${GATEWAY_RATE_LIMIT_WINDOW_SECONDS:60}
