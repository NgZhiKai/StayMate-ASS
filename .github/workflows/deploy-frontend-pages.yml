name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
      - feature/zk-develop
    paths:
      - "frontend/hotel-booking-frontend/**"
      - ".github/workflows/deploy-frontend-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "frontend/hotel-booking-frontend/package-lock.json"

      - name: Install dependencies
        working-directory: frontend/hotel-booking-frontend
        run: npm ci

      - name: Build
        working-directory: frontend/hotel-booking-frontend
        env:
          VITE_APP_API_GATEWAY_BASE_URL: ${{ vars.VITE_APP_API_GATEWAY_BASE_URL }}
          VITE_APP_OPEN_CAGE_API_KEY: ${{ vars.VITE_APP_OPEN_CAGE_API_KEY }}
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/hotel-booking-frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
