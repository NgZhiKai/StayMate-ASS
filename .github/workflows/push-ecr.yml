name: Build and Push Microservices to ECR

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
    paths:
      - "backend/**"
      - ".github/workflows/push-ecr.yml"

env:
  AWS_REGION: ap-southeast-1
  ECR_REPO_PREFIX: staymate

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - booking-service
          - discovery-service
          - email-service
          - hotel-service
          - notification-service
          - payment-service
          - user-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # OIDC is recommended. Replace the role ARN with your AWS account and role.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::241533158848:role/GitHubActionsECRPushRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          SERVICE: ${{ matrix.service }}
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        working-directory: backend
        shell: bash
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          IMAGE_NAME=${ECR_REPO_PREFIX}-${SERVICE}
          docker build \
            -f Dockerfile.microservice \
            --build-arg SERVICE=${SERVICE} \
            -t ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG} \
            -t ${REGISTRY}/${IMAGE_NAME}:latest \
            .
          docker push ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
          docker push ${REGISTRY}/${IMAGE_NAME}:latest

      - name: Verify image exists in ECR
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          IMAGE_NAME=${ECR_REPO_PREFIX}-${SERVICE}
          aws ecr describe-images \
            --repository-name ${IMAGE_NAME} \
            --image-ids imageTag=${GITHUB_SHA} \
            --region ${AWS_REGION}
