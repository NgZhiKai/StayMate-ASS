name: Build, Push, and Deploy ECS Services

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
    paths:
      - "backend/**"
      - ".github/workflows/deploy-ecs.yml"
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-1
  ECS_CLUSTER: staymate-cluster
  ECR_REPO_PREFIX: staymate

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - booking-service
          - email-service
          - hotel-service
          - notification-service
          - payment-service
          - user-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::241533158848:role/GitHubActionsECRPushRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          SERVICE: ${{ matrix.service }}
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        working-directory: backend
        shell: bash
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          IMAGE_NAME=${ECR_REPO_PREFIX}-${SERVICE}
          docker build \
            -f Dockerfile.microservice \
            --build-arg SERVICE=${SERVICE} \
            -t ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG} \
            -t ${REGISTRY}/${IMAGE_NAME}:latest \
            .
          docker push ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
          docker push ${REGISTRY}/${IMAGE_NAME}:latest

      - name: Verify image exists in ECR
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          IMAGE_NAME=${ECR_REPO_PREFIX}-${SERVICE}
          aws ecr describe-images \
            --repository-name ${IMAGE_NAME} \
            --image-ids imageTag=${GITHUB_SHA} \
            --region ${AWS_REGION}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway-service
            image: api-gateway
          - service: booking-service-service
            image: booking-service
          - service: email-service-service
            image: email-service
          - service: hotel-service-service
            image: hotel-service
          - service: notification-service-service
            image: notification-service
          - service: payment-service-service
            image: payment-service
          - service: user-service-service
            image: user-service

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::241533158848:role/GitHubActionsECRPushRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Register new task definition with immutable image tag
        env:
          SERVICE: ${{ matrix.service }}
          IMAGE: ${{ matrix.image }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_NAME="${ECR_REPO_PREFIX}-${IMAGE}"
          IMAGE_URI="${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}"

          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster ${ECS_CLUSTER} \
            --services ${SERVICE} \
            --query "services[0].taskDefinition" \
            --output text)

          aws ecs describe-task-definition \
            --task-definition ${TASK_DEF_ARN} \
            --query taskDefinition > taskdef.json

          jq --arg IMAGE_NAME "${IMAGE_NAME}" --arg IMAGE_URI "${IMAGE_URI}" '
            .containerDefinitions |= map(
              if (.image | contains("/" + $IMAGE_NAME)) then .image = $IMAGE_URI else . end
            )
            | del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
          ' taskdef.json > taskdef-registered.json

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://taskdef-registered.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          aws ecs update-service \
            --cluster ${ECS_CLUSTER} \
            --service ${SERVICE} \
            --task-definition ${NEW_TASK_DEF_ARN} \
            --force-new-deployment \
            --region ${AWS_REGION}

  cleanup-task-definitions:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        family:
          - api-gateway
          - booking-service
          - email-service
          - hotel-service
          - notification-service
          - payment-service
          - user-service

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::241533158848:role/GitHubActionsECRPushRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Deregister old task definitions (keep last 2)
        run: |
          KEEP=2
          ARNS=$(aws ecs list-task-definitions \
            --family-prefix "${{ matrix.family }}" \
            --sort DESC \
            --query "taskDefinitionArns[${KEEP}:]" \
            --output text)

          for ARN in $ARNS; do
            echo "Deregistering $ARN"
            aws ecs deregister-task-definition --task-definition "$ARN"
          done
