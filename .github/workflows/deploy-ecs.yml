name: Deploy Backend and Frontend

on:
  push:
    branches:
      - "master"
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-1
  ECS_CLUSTER: staymate-cluster
  ECR_REPO_PREFIX: staymate

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      backend_matrix: ${{ steps.matrix.outputs.backend_matrix }}
      deploy_matrix: ${{ steps.matrix.outputs.deploy_matrix }}
      cleanup_matrix: ${{ steps.matrix.outputs.cleanup_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            api-gateway:
              - 'backend/api-gateway/**'
            booking-service:
              - 'backend/booking-service/**'
            email-service:
              - 'backend/email-service/**'
            hotel-service:
              - 'backend/hotel-service/**'
            notification-service:
              - 'backend/notification-service/**'
            payment-service:
              - 'backend/payment-service/**'
            user-service:
              - 'backend/user-service/**'

      - name: Build backend matrix
        id: matrix
        run: |
          set -e
          ALL_SERVICES=("api-gateway" "booking-service" "email-service" "hotel-service" "notification-service" "payment-service" "user-service")
          ALL_DEPLOY_ITEMS=(
            "{\"service\":\"api-gateway-service\",\"image\":\"api-gateway\"}"
            "{\"service\":\"booking-service-service\",\"image\":\"booking-service\"}"
            "{\"service\":\"email-service-service\",\"image\":\"email-service\"}"
            "{\"service\":\"hotel-service-service\",\"image\":\"hotel-service\"}"
            "{\"service\":\"notification-service-service\",\"image\":\"notification-service\"}"
            "{\"service\":\"payment-service-service\",\"image\":\"payment-service\"}"
            "{\"service\":\"user-service-service\",\"image\":\"user-service\"}"
          )

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo 'backend_matrix={"service":["api-gateway","booking-service","email-service","hotel-service","notification-service","payment-service","user-service"]}' >> "$GITHUB_OUTPUT"
            echo 'deploy_matrix={"include":[{"service":"api-gateway-service","image":"api-gateway"},{"service":"booking-service-service","image":"booking-service"},{"service":"email-service-service","image":"email-service"},{"service":"hotel-service-service","image":"hotel-service"},{"service":"notification-service-service","image":"notification-service"},{"service":"payment-service-service","image":"payment-service"},{"service":"user-service-service","image":"user-service"}]}' >> "$GITHUB_OUTPUT"
            echo 'cleanup_matrix={"family":["api-gateway","booking-service","email-service","hotel-service","notification-service","payment-service","user-service"]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SERVICES=()
          DEPLOY_ITEMS=()
          FAMILIES=()
          [[ "${{ steps.filter.outputs.api-gateway }}" == "true" ]] && SERVICES+=("\"api-gateway\"")
          [[ "${{ steps.filter.outputs.api-gateway }}" == "true" ]] && DEPLOY_ITEMS+=("{\"service\":\"api-gateway-service\",\"image\":\"api-gateway\"}")
          [[ "${{ steps.filter.outputs.api-gateway }}" == "true" ]] && FAMILIES+=("\"api-gateway\"")
          [[ "${{ steps.filter.outputs.booking-service }}" == "true" ]] && SERVICES+=("\"booking-service\"")
          [[ "${{ steps.filter.outputs.booking-service }}" == "true" ]] && DEPLOY_ITEMS+=("{\"service\":\"booking-service-service\",\"image\":\"booking-service\"}")
          [[ "${{ steps.filter.outputs.booking-service }}" == "true" ]] && FAMILIES+=("\"booking-service\"")
          [[ "${{ steps.filter.outputs.email-service }}" == "true" ]] && SERVICES+=("\"email-service\"")
          [[ "${{ steps.filter.outputs.email-service }}" == "true" ]] && DEPLOY_ITEMS+=("{\"service\":\"email-service-service\",\"image\":\"email-service\"}")
          [[ "${{ steps.filter.outputs.email-service }}" == "true" ]] && FAMILIES+=("\"email-service\"")
          [[ "${{ steps.filter.outputs.hotel-service }}" == "true" ]] && SERVICES+=("\"hotel-service\"")
          [[ "${{ steps.filter.outputs.hotel-service }}" == "true" ]] && DEPLOY_ITEMS+=("{\"service\":\"hotel-service-service\",\"image\":\"hotel-service\"}")
          [[ "${{ steps.filter.outputs.hotel-service }}" == "true" ]] && FAMILIES+=("\"hotel-service\"")
          [[ "${{ steps.filter.outputs.notification-service }}" == "true" ]] && SERVICES+=("\"notification-service\"")
          [[ "${{ steps.filter.outputs.notification-service }}" == "true" ]] && DEPLOY_ITEMS+=("{\"service\":\"notification-service-service\",\"image\":\"notification-service\"}")
          [[ "${{ steps.filter.outputs.notification-service }}" == "true" ]] && FAMILIES+=("\"notification-service\"")
          [[ "${{ steps.filter.outputs.payment-service }}" == "true" ]] && SERVICES+=("\"payment-service\"")
          [[ "${{ steps.filter.outputs.payment-service }}" == "true" ]] && DEPLOY_ITEMS+=("{\"service\":\"payment-service-service\",\"image\":\"payment-service\"}")
          [[ "${{ steps.filter.outputs.payment-service }}" == "true" ]] && FAMILIES+=("\"payment-service\"")
          [[ "${{ steps.filter.outputs.user-service }}" == "true" ]] && SERVICES+=("\"user-service\"")
          [[ "${{ steps.filter.outputs.user-service }}" == "true" ]] && DEPLOY_ITEMS+=("{\"service\":\"user-service-service\",\"image\":\"user-service\"}")
          [[ "${{ steps.filter.outputs.user-service }}" == "true" ]] && FAMILIES+=("\"user-service\"")

          if [[ "${{ steps.filter.outputs.backend }}" == "true" ]] && [[ ${#SERVICES[@]} -eq 0 ]]; then
            # Backend changed, but not in a specific service folder (shared files). Deploy all services.
            SERVICES=()
            DEPLOY_ITEMS=()
            FAMILIES=()
            for SVC in "${ALL_SERVICES[@]}"; do
              SERVICES+=("\"$SVC\"")
              FAMILIES+=("\"$SVC\"")
            done
            DEPLOY_ITEMS=("${ALL_DEPLOY_ITEMS[@]}")
          fi

          if [[ ${#SERVICES[@]} -eq 0 ]]; then
            echo 'backend_matrix={"service":[]}' >> "$GITHUB_OUTPUT"
            echo 'deploy_matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo 'cleanup_matrix={"family":[]}' >> "$GITHUB_OUTPUT"
          else
            echo "backend_matrix={\"service\":[${SERVICES[*]}]}" >> "$GITHUB_OUTPUT"
            echo "deploy_matrix={\"include\":[${DEPLOY_ITEMS[*]}]}" >> "$GITHUB_OUTPUT"
            echo "cleanup_matrix={\"family\":[${FAMILIES[*]}]}" >> "$GITHUB_OUTPUT"
          fi

  deploy-frontend:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "frontend/hotel-booking-frontend/package-lock.json"

      - name: Install dependencies
        working-directory: frontend/hotel-booking-frontend
        run: npm ci

      - name: Build
        working-directory: frontend/hotel-booking-frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::241533158848:role/GitHubActionsECRPushRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync frontend/hotel-booking-frontend/dist s3://www.staymate.org --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1ANYJ00XJRQL6 \
            --paths "/*"

  build-and-push:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.backend_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::241533158848:role/GitHubActionsECRPushRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          SERVICE: ${{ matrix.service }}
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        working-directory: backend
        shell: bash
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          IMAGE_NAME=${ECR_REPO_PREFIX}-${SERVICE}
          docker build \
            -f Dockerfile.microservice \
            --build-arg SERVICE=${SERVICE} \
            -t ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG} \
            -t ${REGISTRY}/${IMAGE_NAME}:latest \
            .
          docker push ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
          docker push ${REGISTRY}/${IMAGE_NAME}:latest

      - name: Verify image exists in ECR
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          IMAGE_NAME=${ECR_REPO_PREFIX}-${SERVICE}
          aws ecr describe-images \
            --repository-name ${IMAGE_NAME} \
            --image-ids imageTag=${GITHUB_SHA} \
            --region ${AWS_REGION}

  deploy:
    needs: [build-and-push, changes]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.deploy_matrix) }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::241533158848:role/GitHubActionsECRPushRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Register new task definition with immutable image tag
        env:
          SERVICE: ${{ matrix.service }}
          IMAGE: ${{ matrix.image }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_NAME="${ECR_REPO_PREFIX}-${IMAGE}"
          IMAGE_URI="${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}"

          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster ${ECS_CLUSTER} \
            --services ${SERVICE} \
            --query "services[0].taskDefinition" \
            --output text)

          aws ecs describe-task-definition \
            --task-definition ${TASK_DEF_ARN} \
            --query taskDefinition > taskdef.json

          jq --arg IMAGE_NAME "${IMAGE_NAME}" --arg IMAGE_URI "${IMAGE_URI}" '
            .containerDefinitions |= map(
              if (.image | contains("/" + $IMAGE_NAME)) then .image = $IMAGE_URI else . end
            )
            | del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
          ' taskdef.json > taskdef-registered.json

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://taskdef-registered.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          aws ecs update-service \
            --cluster ${ECS_CLUSTER} \
            --service ${SERVICE} \
            --task-definition ${NEW_TASK_DEF_ARN} \
            --force-new-deployment \
            --region ${AWS_REGION}

  cleanup-task-definitions:
    needs: [deploy, changes]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.cleanup_matrix) }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::241533158848:role/GitHubActionsECRPushRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Deregister old task definitions (keep last 2)
        run: |
          KEEP=2
          ARNS=$(aws ecs list-task-definitions \
            --family-prefix "${{ matrix.family }}" \
            --sort DESC \
            --query "taskDefinitionArns[${KEEP}:]" \
            --output text)

          for ARN in $ARNS; do
            echo "Deregistering $ARN"
            aws ecs deregister-task-definition --task-definition "$ARN"
          done
